<!DOCTYPE html>
<html>
<head>
  <title>Clara Automation Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Clara Automation Pipeline Dashboard</h1>

<div class="stats">

  <div class="card">
    <h2 id="totalAccounts">0</h2>
    <p>Total Accounts</p>
  </div>

  <div class="card">
    <h2 id="v1Count">0</h2>
    <p>v1 Generated</p>
  </div>

  <div class="card">
    <h2 id="v2Count">0</h2>
    <p>v2 Generated</p>
  </div>

</div>
<table id="accountsTable">
  <thead>
    <tr>
      <th>Account</th>
      <th>v1 Generated</th>
      <th>v2 Generated</th>
      <th>Last Updated</th>
    </tr>
  </thead>

  <tbody>
  </tbody>
</table>

<script src="app.js"></script>

</body>
</html>
